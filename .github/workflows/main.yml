name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Compute base path
        id: base
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          # User/org sites (<user>.github.io) are served from root.
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build project
        env:
          BASE_PATH: /
        run: npm run build

      - name: Prepare Pages output
        run: |
          touch dist/client/.nojekyll
          # SPA fallback so deep links keep working on Pages.
          if [ -f dist/client/index.html ] && [ ! -f dist/client/404.html ]; then
            cp dist/client/index.html dist/client/404.html
          fi
          ls -la dist/client

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
